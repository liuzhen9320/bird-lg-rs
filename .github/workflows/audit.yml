# eslint-disable yml/no-empty-mapping-value
name: Security Audit

on:
  schedule:
    - cron: "48 2 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  audit:
    name: job ❯ cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ─────────────────────────────────────────────────────
      - name: Bootstrap ❯❯ actions/checkout@v6
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Bootstrap ❯❯ Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Bootstrap ❯❯ Debug ❯❯ Show version information
        run: |
          rustup -V
          cargo -V
          rustc -V

      - name: Bootstrap ❯❯ Install cargo-audit
        run: cargo install cargo-audit

      - name: Run ❯❯ cargo audit
        run: cargo audit
